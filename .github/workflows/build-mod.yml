name: Build Mod

on:
  push:
    branches:
      - main
    paths-ignore:
      - BUILD_FAILURE_LOG.md
      - "dist/**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build
        run: gradle build

      - name: Commit built mod jar
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          mkdir -p dist
          find build/libs -maxdepth 1 -type f -name "ai-companion-*.jar" ! -name "*-sources.jar" -exec cp {} dist/ \;
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/*.jar
          if ! git diff --cached --quiet; then
            git commit -m "build: publish compiled mod jar"
            git push
          fi

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: ai-companion-mod
          path: build/libs/*.jar
